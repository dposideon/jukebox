<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ADMIN // JUKEBOX</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Share+Tech+Mono&display=swap');

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Share Tech Mono', 'Courier New', monospace;
      background: #000;
      color: #c0ffc0;
      min-height: 100vh;
      overflow-x: hidden;
    }

    /* Matrix rain canvas */
    #rain {
      position: fixed;
      inset: 0;
      z-index: 0;
      opacity: 0.12;
    }

    /* Red vignette - "you've left the Matrix" */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      z-index: 1;
      pointer-events: none;
      background: radial-gradient(
        ellipse at center,
        transparent 50%,
        rgba(180, 0, 30, 0.15) 100%
      );
    }

    /* Scanlines */
    body::after {
      content: '';
      position: fixed;
      inset: 0;
      z-index: 9999;
      pointer-events: none;
      background: repeating-linear-gradient(
        0deg,
        rgba(0, 0, 0, 0.08) 0px,
        rgba(0, 0, 0, 0.08) 1px,
        transparent 1px,
        transparent 3px
      );
    }

    .container {
      position: relative;
      z-index: 2;
      max-width: 600px;
      margin: 0 auto;
      padding: 2rem 1rem;
    }

    /* --- Glitch title --- */
    .title-wrap {
      text-align: center;
      margin-bottom: 0.25rem;
      position: relative;
    }
    h1 {
      font-size: 2.2rem;
      color: #ff2040;
      text-shadow:
        0 0 7px #ff2040,
        0 0 30px #ff2040,
        0 0 60px rgba(255, 32, 64, 0.4);
      letter-spacing: 0.2em;
      animation: glitch 4s infinite;
      position: relative;
      display: inline-block;
    }
    h1::before,
    h1::after {
      content: attr(data-text);
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      overflow: hidden;
    }
    h1::before {
      animation: glitchTop 3s infinite linear alternate-reverse;
      clip-path: inset(0 0 60% 0);
      color: #0ff;
    }
    h1::after {
      animation: glitchBottom 2.5s infinite linear alternate-reverse;
      clip-path: inset(60% 0 0 0);
      color: #ff2040;
    }
    @keyframes glitchTop {
      0%   { transform: translate(0); }
      20%  { transform: translate(-2px, 2px); }
      40%  { transform: translate(2px, -1px); }
      60%  { transform: translate(-1px, 1px); }
      80%  { transform: translate(1px, -2px); }
      100% { transform: translate(0); }
    }
    @keyframes glitchBottom {
      0%   { transform: translate(0); }
      25%  { transform: translate(2px, 1px); }
      50%  { transform: translate(-2px, -1px); }
      75%  { transform: translate(1px, 2px); }
      100% { transform: translate(0); }
    }
    @keyframes glitch {
      0%, 92%, 100% { opacity: 1; }
      93% { opacity: 0.8; transform: skewX(-2deg); }
      94% { opacity: 1; transform: skewX(0); }
      95% { opacity: 0.6; transform: skewX(3deg); }
      96% { opacity: 1; transform: skewX(0); }
    }
    .subtitle {
      text-align: center;
      color: #ff204080;
      font-size: 0.75rem;
      letter-spacing: 0.25em;
      margin-bottom: 2rem;
    }

    /* --- Sections --- */
    section {
      margin-bottom: 1.5rem;
      border: 1px solid #2a0a0f;
      border-radius: 6px;
      padding: 1rem;
      background: rgba(15, 5, 5, 0.85);
      backdrop-filter: blur(4px);
    }
    section h2 {
      font-size: 0.8rem;
      text-transform: uppercase;
      letter-spacing: 0.2em;
      color: #ff2040;
      margin-bottom: 0.6rem;
      padding-bottom: 0.35rem;
      border-bottom: 1px solid #2a0a0f;
      text-shadow: 0 0 6px rgba(255, 32, 64, 0.4);
    }

    /* --- Controls --- */
    .controls {
      display: flex;
      gap: 0.75rem;
      justify-content: center;
      flex-wrap: wrap;
    }
    .ctrl-btn {
      flex: 1;
      min-width: 120px;
      max-width: 180px;
      padding: 1rem 1.5rem;
      border: 1px solid #2a0a0f;
      border-radius: 6px;
      background: rgba(20, 5, 8, 0.9);
      color: #ff2040;
      cursor: pointer;
      font-family: inherit;
      font-size: 1rem;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      transition: all 0.2s;
      position: relative;
      overflow: hidden;
    }
    .ctrl-btn::before {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(
        180deg,
        rgba(255, 32, 64, 0.05) 0%,
        transparent 100%
      );
      opacity: 0;
      transition: opacity 0.2s;
    }
    .ctrl-btn:hover::before { opacity: 1; }
    .ctrl-btn:hover {
      border-color: #ff2040;
      box-shadow:
        0 0 15px rgba(255, 32, 64, 0.2),
        inset 0 0 15px rgba(255, 32, 64, 0.05);
      text-shadow: 0 0 10px rgba(255, 32, 64, 0.6);
    }
    .ctrl-btn:active {
      transform: scale(0.97);
      box-shadow: 0 0 25px rgba(255, 32, 64, 0.4);
    }
    .ctrl-btn .icon {
      display: block;
      font-size: 1.6rem;
      margin-bottom: 0.3rem;
    }

    /* Play gets green to stand out */
    .ctrl-btn.play-btn {
      color: #00ff41;
      border-color: #1a3a1a;
    }
    .ctrl-btn.play-btn:hover {
      border-color: #00ff41;
      box-shadow:
        0 0 15px rgba(0, 255, 65, 0.2),
        inset 0 0 15px rgba(0, 255, 65, 0.05);
      text-shadow: 0 0 10px rgba(0, 255, 65, 0.6);
    }
    .ctrl-btn.play-btn:active {
      box-shadow: 0 0 25px rgba(0, 255, 65, 0.4);
    }

    /* Pause gets purple */
    .ctrl-btn.pause-btn {
      color: #b44aff;
      border-color: #2a1a3a;
    }
    .ctrl-btn.pause-btn:hover {
      border-color: #b44aff;
      box-shadow:
        0 0 15px rgba(180, 74, 255, 0.2),
        inset 0 0 15px rgba(180, 74, 255, 0.05);
      text-shadow: 0 0 10px rgba(180, 74, 255, 0.6);
    }
    .ctrl-btn.pause-btn:active {
      box-shadow: 0 0 25px rgba(180, 74, 255, 0.4);
    }

    /* --- Now Playing --- */
    #np-content {
      padding: 0.75rem;
      border-radius: 6px;
      background: rgba(10, 3, 3, 0.8);
      border: 1px solid #2a0a0f;
      min-height: 3rem;
      display: flex;
      align-items: center;
    }
    #np-content.empty { color: #3a1a1a; font-style: italic; }
    .np-title {
      color: #00ff41;
      text-shadow: 0 0 5px rgba(0, 255, 65, 0.4);
    }
    .np-channel { font-size: 0.8rem; color: #5a8a5a; margin-top: 0.15rem; }
    .np-duration {
      margin-left: auto;
      color: #b44aff;
      white-space: nowrap;
      padding-left: 1rem;
      text-shadow: 0 0 5px rgba(180, 74, 255, 0.4);
      font-variant-numeric: tabular-nums;
    }

    /* EQ bars */
    .eq-bars {
      display: flex;
      align-items: flex-end;
      gap: 2px;
      height: 18px;
      margin-right: 0.75rem;
    }
    .eq-bars span {
      display: block;
      width: 3px;
      background: #00ff41;
      border-radius: 1px;
      animation: eqPulse 0.8s ease-in-out infinite alternate;
      box-shadow: 0 0 4px rgba(0, 255, 65, 0.6);
    }
    .eq-bars span:nth-child(1) { animation-duration: 0.6s; height: 30%; }
    .eq-bars span:nth-child(2) { animation-duration: 0.8s; height: 70%; }
    .eq-bars span:nth-child(3) { animation-duration: 0.5s; height: 50%; }
    .eq-bars span:nth-child(4) { animation-duration: 0.7s; height: 90%; }
    .eq-bars span:nth-child(5) { animation-duration: 0.55s; height: 40%; }
    @keyframes eqPulse {
      from { transform: scaleY(0.3); }
      to   { transform: scaleY(1); }
    }

    /* --- Queue items --- */
    .queue-item {
      padding: 0.5rem 0.75rem;
      border-radius: 4px;
      background: rgba(10, 3, 3, 0.8);
      border: 1px solid #2a0a0f;
      margin-bottom: 0.35rem;
      display: flex;
      align-items: center;
      gap: 0.75rem;
    }
    .queue-pos {
      color: #ff2040;
      font-weight: bold;
      min-width: 1.5rem;
      text-align: center;
      text-shadow: 0 0 4px rgba(255, 32, 64, 0.3);
    }
    .queue-info { flex: 1; min-width: 0; }
    .queue-title {
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      color: #a0e0a0;
    }
    .queue-meta { font-size: 0.75rem; color: #3d6a3d; }
    .queue-empty {
      color: #2a0a0f;
      font-style: italic;
      text-align: center;
      padding: 0.5rem;
    }

    .badge {
      font-size: 0.65rem;
      padding: 0.15rem 0.4rem;
      border-radius: 3px;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      white-space: nowrap;
    }
    .badge-ready {
      background: rgba(0, 255, 65, 0.1);
      color: #00ff41;
      border: 1px solid #00ff4133;
    }
    .badge-pending {
      background: rgba(180, 74, 255, 0.1);
      color: #b44aff;
      border: 1px solid #b44aff33;
    }

    /* --- Status toast --- */
    #cmd-status {
      margin-top: 0.75rem;
      padding: 0.5rem;
      border-radius: 4px;
      text-align: center;
      display: none;
      font-size: 0.85rem;
    }
    #cmd-status.success {
      display: block;
      background: rgba(0, 255, 65, 0.08);
      color: #00ff41;
      border: 1px solid #00ff4133;
    }
    #cmd-status.error {
      display: block;
      background: rgba(255, 32, 64, 0.08);
      color: #ff2040;
      border: 1px solid #ff204033;
    }

    /* Scrollbar */
    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: #000; }
    ::-webkit-scrollbar-thumb { background: #2a0a0f; border-radius: 3px; }
    ::-webkit-scrollbar-thumb:hover { background: #4a1a2f; }
  </style>
</head>
<body>

<canvas id="rain"></canvas>

<div class="container">
  <div class="title-wrap">
    <h1 data-text="OPERATOR">OPERATOR</h1>
  </div>
  <p class="subtitle">// ROOT ACCESS GRANTED //</p>

  <!-- Controls -->
  <section>
    <h2>&gt; Controls</h2>
    <div class="controls">
      <button class="ctrl-btn play-btn" onclick="sendCmd('play')">
        <span class="icon">&#9654;</span>
        PLAY
      </button>
      <button class="ctrl-btn pause-btn" onclick="sendCmd('pause')">
        <span class="icon">&#9646;&#9646;</span>
        PAUSE
      </button>
      <button class="ctrl-btn" onclick="sendCmd('skip')">
        <span class="icon">&#9197;</span>
        SKIP
      </button>
    </div>
    <div id="cmd-status"></div>
  </section>

  <!-- Now Playing -->
  <section>
    <h2>&gt; Now Playing</h2>
    <div id="np-content" class="empty">No signal...</div>
  </section>

  <!-- Downloaded Queue -->
  <section>
    <h2>&gt; Ready to Play</h2>
    <div id="dl-queue">
      <div class="queue-empty">No tracks loaded</div>
    </div>
  </section>

  <!-- Pending Queue -->
  <section>
    <h2>&gt; Queued</h2>
    <div id="pend-queue">
      <div class="queue-empty">Queue empty</div>
    </div>
  </section>
</div>

<script>
  const $ = id => document.getElementById(id);
  const POLL_MS = 3000;

  function fmtDuration(dur) {
    const m = Math.floor(dur / 60);
    const s = String(dur % 60).padStart(2, '0');
    return m + ':' + s;
  }

  function esc(text) {
    const d = document.createElement('div');
    d.textContent = text;
    return d.innerHTML;
  }

  // ---- Matrix Rain ----

  (function initRain() {
    const canvas = $('rain');
    const ctx = canvas.getContext('2d');
    let cols, drops;

    const CHARS = 'アイウエオカキクケコサシスセソタチツテトナニヌネノハヒフヘホマミムメモヤユヨラリルレロワヲン0123456789ABCDEF';

    function resize() {
      canvas.width = window.innerWidth;
      canvas.height = window.innerHeight;
      cols = Math.floor(canvas.width / 14);
      drops = Array.from({ length: cols }, () =>
        Math.random() * -canvas.height / 14
      );
    }
    window.addEventListener('resize', resize);
    resize();

    function draw() {
      ctx.fillStyle = 'rgba(0, 0, 0, 0.05)';
      ctx.fillRect(0, 0, canvas.width, canvas.height);
      ctx.fillStyle = '#00ff41';
      ctx.font = '14px monospace';

      for (let i = 0; i < cols; i++) {
        const ch = CHARS[Math.floor(Math.random() * CHARS.length)];
        const x = i * 14;
        const y = drops[i] * 14;
        ctx.fillStyle = Math.random() > 0.95 ? '#ff2040' : '#00ff41';
        ctx.fillText(ch, x, y);
        if (y > canvas.height && Math.random() > 0.975) {
          drops[i] = 0;
        }
        drops[i]++;
      }
      requestAnimationFrame(draw);
    }
    draw();
  })();

  // ---- Controls ----

  async function sendCmd(cmd) {
    const el = $('cmd-status');
    el.className = '';

    try {
      const res = await fetch('/admin/api/' + cmd, { method: 'POST' });
      if (!res.ok) throw new Error(res.statusText);
      showCmd('> ' + cmd.toUpperCase() + ' executed', true);
      if (cmd === 'skip') {
        pollNowPlaying();
        pollQueues();
      }
    } catch (e) {
      showCmd('> ERR: ' + e.message, false);
    }
  }

  function showCmd(msg, ok) {
    const el = $('cmd-status');
    el.textContent = msg;
    el.className = ok ? 'success' : 'error';
    setTimeout(() => { el.className = ''; }, 2500);
  }

  // ---- Polling ----

  async function pollNowPlaying() {
    try {
      const res = await fetch('/api/now_playing');
      if (!res.ok) return;
      const song = await res.json();
      const el = $('np-content');
      if (!song) {
        el.className = 'empty';
        el.innerHTML = 'No signal...';
      } else {
        el.className = '';
        el.innerHTML =
          `<div class="eq-bars">
            <span></span><span></span><span></span>
            <span></span><span></span>
          </div>
          <div>
            <div class="np-title">${esc(song.title)}</div>
            <div class="np-channel">${esc(song.channel)}</div>
          </div>
          <span class="np-duration">${fmtDuration(song.duration)}</span>`;
      }
    } catch (_) {}
  }

  async function pollQueues() {
    try {
      const r1 = await fetch('/api/downloaded_queue');
      if (r1.ok) {
        const q = await r1.json();
        const el = $('dl-queue');
        if (q.length === 0) {
          el.innerHTML =
            '<div class="queue-empty">No tracks loaded</div>';
        } else {
          el.innerHTML = q.map((s, i) =>
            `<div class="queue-item">
              <span class="queue-pos">${i + 1}</span>
              <div class="queue-info">
                <div class="queue-title">${esc(s.title)}</div>
                <div class="queue-meta">
                  ${esc(s.channel)} &middot; ${fmtDuration(s.duration)}
                </div>
              </div>
              <span class="badge badge-ready">ready</span>
            </div>`
          ).join('');
        }
      }
    } catch (_) {}

    try {
      const r2 = await fetch('/api/queue');
      if (r2.ok) {
        const q = await r2.json();
        const el = $('pend-queue');
        if (q.length === 0) {
          el.innerHTML =
            '<div class="queue-empty">Queue empty</div>';
        } else {
          el.innerHTML = q.map((s, i) =>
            `<div class="queue-item">
              <span class="queue-pos">${i + 1}</span>
              <div class="queue-info">
                <div class="queue-title">${esc(s.title)}</div>
                <div class="queue-meta">
                  ${esc(s.channel)} &middot; ${fmtDuration(s.duration)}
                </div>
              </div>
              <span class="badge badge-pending">pending</span>
            </div>`
          ).join('');
        }
      }
    } catch (_) {}
  }

  // ---- Init ----
  pollNowPlaying();
  pollQueues();
  setInterval(pollNowPlaying, POLL_MS);
  setInterval(pollQueues, POLL_MS);
</script>
</body>
</html>
